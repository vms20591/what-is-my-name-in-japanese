<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>what's my name in japanese?</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f6f3;
      --bg-info: #e6f1fb;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --text-info: #185fa5;
      --border: rgba(0, 0, 0, 0.15);
      --border-secondary: rgba(0, 0, 0, 0.22);
      --border-info: #378add;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #242422;
        --bg-info: #042c53;
        --text-primary: #f0ede6;
        --text-secondary: #b4b2a9;
        --text-tertiary: #888780;
        --text-info: #85b7eb;
        --border: rgba(255, 255, 255, 0.12);
        --border-secondary: rgba(255, 255, 255, 0.2);
        --border-info: #378add;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #app {
      width: 100%;
      max-width: 860px;
    }

    h1 {
      font-size: 24px;
      font-variant-caps: all-petite-caps;
      font-weight: 500;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 1.25rem;
      letter-spacing: 0.01em;
    }

    .panels {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 560px) {
      .panels {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--bg);
      border: 0.5px solid var(--border-secondary);
      border-radius: var(--radius-lg);
      padding: 14px;
    }

    .panel-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    #chart-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .char-cell {
      border: 0.5px solid var(--border);
      border-radius: 6px;
      padding: 5px 2px;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .char-cell.active {
      background: var(--bg-info);
      border-color: var(--border-info);
    }

    .char-cell .jp {
      font-size: 16px;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .char-cell .en {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.2;
      margin-top: 1px;
    }

    .char-cell.active .jp {
      color: var(--text-info);
    }

    .char-cell.active .en {
      color: var(--text-info);
    }

    #result-panel {
      display: flex;
      flex-direction: column;
      min-height: 140px;
    }

    #result-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    #result-jp {
      font-size: 20px;
      color: var(--text-primary);
      letter-spacing: 0.12em;
      font-weight: 400;
      line-height: 1.4;
      text-align: center;
      word-break: break-all;
    }

    #result-en {
      font-size: 16px;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
      margin-top: 6px;
      text-align: center;
      word-break: break-all;
    }

    .placeholder {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    #name-input {
      width: 100%;
      border: 0.5px solid var(--border-secondary);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      font-size: 18px;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--bg);
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #name-input:focus {
      border-color: var(--border-info);
      box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.15);
    }

    #name-input::placeholder {
      color: var(--text-tertiary);
      font-size: 15px;
    }
  </style>
</head>

<body>
  <div id="app">
    <h1>what's my name in japanese?</h1>
    <div class="panels">
      <div class="panel">
        <div class="panel-label">letter chart</div>
        <div id="chart-grid"></div>
      </div>
      <div class="panel" id="result-panel">
        <div class="panel-label">your name</div>
        <div id="result-body">
          <div id="result-jp"><span class="placeholder">start typing...</span></div>
          <div id="result-en"></div>
        </div>
      </div>
    </div>
    <input id="name-input" type="text" placeholder="type your name in english" autocomplete="off" spellcheck="false" />
  </div>

  <script>
    const MAP = {
      A: 'ka', B: 'tu', C: 'mi', D: 'te', E: 'ku', F: 'lu', G: 'ji', H: 'ri', I: 'ki',
      J: 'zu', K: 'me', L: 'ta', M: 'rin', N: 'to', O: 'mo', P: 'no', Q: 'ke', R: 'shi',
      S: 'ari', T: 'chi', U: 'do', V: 'ru', W: 'mei', X: 'na', Y: 'fu', Z: 'zi'
    };

    const KANA = {
      ka: 'か', tu: 'つ', mi: 'み', te: 'て', ku: 'く', lu: 'る', ji: 'じ', ri: 'り', ki: 'き',
      zu: 'ず', me: 'め', ta: 'た', rin: 'りん', to: 'と', mo: 'も', no: 'の', ke: 'け', shi: 'し',
      ari: 'あり', chi: 'ち', do: 'ど', ru: 'る', mei: 'めい', na: 'な', fu: 'ふ', zi: 'ず'
    };

    const grid = document.getElementById('chart-grid');
    'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
      const cell = document.createElement('div');
      cell.className = 'char-cell';
      cell.id = 'cell-' + l;
      const romaji = MAP[l];
      cell.innerHTML = `<div class="jp">${KANA[romaji] || romaji}</div><div class="en">${l.toLowerCase()}</div>`;
      grid.appendChild(cell);
    });

    const input = document.getElementById('name-input');
    const resultJp = document.getElementById('result-jp');
    const resultEn = document.getElementById('result-en');

    input.addEventListener('input', () => {
      const val = input.value.toUpperCase().replace(/[^A-Z]/g, '');

      document.querySelectorAll('.char-cell').forEach(c => c.classList.remove('active'));
      const seen = new Set();
      val.split('').forEach(l => {
        if (!seen.has(l)) {
          seen.add(l);
          const cell = document.getElementById('cell-' + l);
          if (cell) cell.classList.add('active');
        }
      });

      if (!val) {
        resultJp.innerHTML = '<span class="placeholder">start typing...</span>';
        resultEn.textContent = '';
        return;
      }

      let jpText = '';
      const enParts = [];
      val.split('').forEach(l => {
        const romaji = MAP[l] || '';
        jpText += KANA[romaji] || '';
        if (romaji) enParts.push(romaji);
      });

      const enText = enParts.length
        ? enParts[0].charAt(0).toUpperCase() + enParts[0].slice(1) +
        (enParts.length > 1 ? ' ' + enParts.slice(1).join(' ') : '')
        : '';

      resultJp.textContent = jpText;
      resultEn.textContent = enText;
    });

    input.focus();
  </script>
</body>

</html>
